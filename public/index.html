<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VTT</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #888;
      margin-bottom: 2rem;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }
    .status.connecting { background: #1a1a2e; color: #7f8ca3; }
    .status.connected { background: #0a2e1a; color: #4ade80; }
    .status.disconnected { background: #2e1a1a; color: #f87171; }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }
    .log {
      text-align: left;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 16px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.8rem;
      line-height: 1.8;
      max-height: 300px;
      overflow-y: auto;
    }
    .log-entry { color: #888; }
    .log-entry.success { color: #4ade80; }
    .log-entry.info { color: #60a5fa; }
    .log-entry.error { color: #f87171; }

    button {
      margin-top: 1rem;
      padding: 8px 20px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: #e0e0e0;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button:hover { background: #252525; }
  </style>
</head>
<body>
  <div class="container">
    <h1>VTT</h1>
    <p class="subtitle">Virtual Tabletop — dev server</p>

    <div class="status connecting" id="status">
      <span class="dot"></span>
      <span id="status-text">connecting...</span>
    </div>

    <div class="log" id="log"></div>

    <button onclick="sendPing()">Send ping</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const logEl = document.getElementById('log');
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('status-text');

    function log(msg, type = '') {
      const time = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = 'log-entry ' + type;
      entry.textContent = `[${time}] ${msg}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function setStatus(state, text) {
      statusEl.className = 'status ' + state;
      statusText.textContent = text;
    }

    // Connect to Socket.io server
    const socket = io();

    socket.on('connect', () => {
      setStatus('connected', 'connected — ' + socket.id);
      log('Connected to server (id: ' + socket.id + ')', 'success');
    });

    socket.on('disconnect', () => {
      setStatus('disconnected', 'disconnected');
      log('Disconnected from server', 'error');
    });

    socket.on('pong', (data) => {
      log('Server responded: ' + JSON.stringify(data), 'info');
    });

    function sendPing() {
      log('Sending ping...');
      socket.emit('ping', { timestamp: Date.now() });
    }
  </script>
</body>
</html>
